apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://hub-prometheus:9090
    isDefault: true
    editable: true

  - name: PostgreSQL
    type: postgres
    url: hub-postgres:5432
    database: ${POSTGRES_DB:-agent_ayan_db}
    user: ${POSTGRES_USER:-ayan_admin}
    jsonData:
      sslmode: disable
      postgresVersion: 1500
    secureJsonData:
      password: ${POSTGRES_PASSWORD:-changeme_in_production}
    editable: true

  - name: Redis
    type: redis-datasource
    url: hub-redis:6379
    jsonData:
      client: standalone
    secureJsonData:
      password: ${REDIS_PASSWORD:-changeme_in_production}
    editable: true
